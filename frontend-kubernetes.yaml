apiVersion: apps/v1
kind: Deployment
metadata:
  name: temperaturas-frontend-deploy
  labels:
    app: temperaturas-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temperaturas-frontend
  template:
    metadata:
      labels:
        app: temperaturas-frontend
    spec:
      containers:
        - name: temperaturas-frontend
          image: hermesbl97/temperaturas-frontend:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: TEMP_SERVER
              value: "temperaturas-backend-svc:5000"
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
---
apiVersion: v1
kind: Service
metadata:
  name: temperaturas-frontend-svc
  labels:
    app: temperaturas-frontend
spec:
  selector:
    app: temperaturas-frontend
  ports:
    - port: 80          
      targetPort: 3001  
  type: LoadBalancer